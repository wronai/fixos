version: "3.9"

# ═══════════════════════════════════════════════════════════
#  fixos – Multi-System Test Environments (Docker)
# ═══════════════════════════════════════════════════════════
#
#  Użycie:
#    docker compose -f docker/docker-compose.multi-system.yml build
#    docker compose -f docker/docker-compose.multi-system.yml run test-fedora
#    docker compose -f docker/docker-compose.multi-system.yml run test-ubuntu
#
#  Wszystkie systemy:
#    ./docker/test-multi-system.sh
#
# ═══════════════════════════════════════════════════════════

x-common-test: &common-test
  volumes:
    - ..:/app:ro
    - /tmp/fixos-test-reports:/reports
  env_file:
    - ../.env
  environment:
    - FIXOS_TEST_MODE=1
    - REPORTS_DIR=/reports
    - LLM_PROVIDER=gemini
    - PYTEST_ADDOPTS="-v --tb=short"
  networks:
    - fixos-test

services:

  # ═══════════════════════════════════════════════════════════
  #  FEDORA (base system)
  # ═══════════════════════════════════════════════════════════

  test-fedora:
    <<: *common-test
    build:
      context: ..
      dockerfile: docker/fedora/Dockerfile
    image: fixos-test:fedora
    container_name: fixos-test-fedora
    command: >
      sh -c "
        echo '=== Testing on Fedora ===' &&
        fixos --version &&
        fixos scan --help &&
        pip install pytest pytest-mock --quiet &&
        python -m pytest tests/unit/ -v --tb=short -x
      "

  # ═══════════════════════════════════════════════════════════
  #  UBUNTU (Debian-based)
  # ═══════════════════════════════════════════════════════════

  test-ubuntu:
    <<: *common-test
    build:
      context: ..
      dockerfile: docker/ubuntu/Dockerfile
    image: fixos-test:ubuntu
    container_name: fixos-test-ubuntu
    command: >
      sh -c "
        echo '=== Testing on Ubuntu ===' &&
        fixos --version &&
        fixos scan --help &&
        pip install pytest pytest-mock --quiet &&
        python -m pytest tests/unit/ -v --tb=short -x
      "

  # ═══════════════════════════════════════════════════════════
  #  DEBIAN
  # ═══════════════════════════════════════════════════════════

  test-debian:
    <<: *common-test
    build:
      context: ..
      dockerfile: docker/debian/Dockerfile
    image: fixos-test:debian
    container_name: fixos-test-debian
    command: >
      sh -c "
        echo '=== Testing on Debian ===' &&
        fixos --version &&
        fixos scan --help &&
        pip install pytest pytest-mock --quiet &&
        python -m pytest tests/unit/ -v --tb=short -x
      "

  # ═══════════════════════════════════════════════════════════
  #  ARCH LINUX
  # ═══════════════════════════════════════════════════════════

  test-arch:
    <<: *common-test
    build:
      context: ..
      dockerfile: docker/arch/Dockerfile
    image: fixos-test:arch
    container_name: fixos-test-arch
    command: >
      sh -c "
        echo '=== Testing on Arch Linux ===' &&
        fixos --version &&
        fixos scan --help &&
        pip install pytest pytest-mock --quiet &&
        python -m pytest tests/unit/ -v --tb=short -x
      "

  # ═══════════════════════════════════════════════════════════
  #  ALPINE (minimal)
  # ═══════════════════════════════════════════════════════════

  test-alpine:
    <<: *common-test
    build:
      context: ..
      dockerfile: docker/alpine/Dockerfile
    image: fixos-test:alpine
    container_name: fixos-test-alpine
    command: >
      sh -c "
        echo '=== Testing on Alpine ===' &&
        fixos --version &&
        fixos scan --help &&
        pip install pytest pytest-mock --quiet &&
        python -m pytest tests/unit/ -v --tb=short -x
      "

  # ═══════════════════════════════════════════════════════════
  #  ALL SYSTEMS - Parallel Test Runner
  # ═══════════════════════════════════════════════════════════

  test-all:
    <<: *common-test
    build:
      context: ..
      dockerfile: docker/fedora/Dockerfile
    container_name: fixos-test-orchestrator
    profiles: ["orchestrator"]
    command: >
      sh -c "
        echo 'Use: ./docker/test-multi-system.sh' &&
        echo 'Or run individual services:' &&
        echo '  docker compose -f docker/docker-compose.multi-system.yml run test-fedora' &&
        echo '  docker compose -f docker/docker-compose.multi-system.yml run test-ubuntu' &&
        echo '  docker compose -f docker/docker-compose.multi-system.yml run test-debian' &&
        echo '  docker compose -f docker/docker-compose.multi-system.yml run test-arch' &&
        echo '  docker compose -f docker/docker-compose.multi-system.yml run test-alpine'
      "

networks:
  fixos-test:
    driver: bridge

volumes:
  test-reports:
