# ═══════════════════════════════════════════════
# KATEGORIA: repos — repozytoria dodatkowe
# ═══════════════════════════════════════════════

repos:
  description: "Repozytoria dodatkowe"
  category: repos
  packages:
    - id: rpm_fusion_free
      desc: "RPM Fusion Free (kodeki, sterowniki)"
      condition: "distro == 'fedora'"
      install_script: "sudo dnf install -y https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm"

    - id: flathub
      desc: "Repozytorium Flathub (Flatpak)"
      install_script: "flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo"
