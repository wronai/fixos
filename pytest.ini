[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --disable-warnings -m "not slow and not docker"
markers =
    real_api: marks tests requiring real API key (skip with -m "not real_api")
    docker: marks tests requiring Docker environment
    slow: marks slow tests (slow_tests)
timeout = 30
timeout_method = thread
